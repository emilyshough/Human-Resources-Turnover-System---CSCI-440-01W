<!DOCTYPE html>
<html>
    <head>
        <title>XYZ Company HR Website</title>
        <link rel="stylesheet" href="csstest.css">
    </head>
    <body>
        <div id="managerDashboardHeader">
            <p>Manager Dashboard</p>
        </div>
        <p id="welcomeMessage"></p>
        <div class="managerDashboardColumn">
            <div id="conductExitInterview">
                <p>Conduct Exit Interview</p>
            </div>

            <div id="processOffboarding">
                <p>Process Offboarding</p>
            </div>

            <div id="manageEmployeeSeparation">
                <p>Manage Employee Separation</p>
            </div>

            <div id="generateTurnoverReport">
                <p>Generate Turnover Report</p>
            </div>

            <div id="updateEmployeeRecords">
                <p>Update Employee Records</p>
            </div>
        </div>
        
    <script>
        const loggedInManager = sessionStorage.getItem("loggedInManager");

        if (!loggedInManager) {
            window.location.href = "index.html";
        }

        document.getElementById("welcomeMessage").innerText = "Welcome, " + loggedInManager + "!";
    </script>
    </body>
</html>
