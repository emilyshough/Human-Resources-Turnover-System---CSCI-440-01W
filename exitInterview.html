<!DOCTYPE html>
<!--HTML and script for the Exit Interview Page-->
<!--Created by Emily Hough-->
<html>
    <head>
        <!--Title for the website-->
        <title>XYZ Company HR Website</title>

        <!--Link to the css style sheet-->
        <link rel="stylesheet" href="csstest.css">
    </head>
    <body>
        <!--"Home" button that takes the user back to the dashboard-->
        <a href="managerDashboard.html" id="dashboard">⬅ Dashboard</a>

        <!--Header for the page-->
        <div id="exitInterviewHeader">
            <p>Conduct Exit Interview</p>
        </div>
        
        <!--A To-Do list that the manager can use to check items off for an exit interview-->
        <div class="todoListColumn">
            <div>
                <!--Title for To-Do list-->
                <p>Exit Interview To-Do List:</p>
            </div>
            <form>
                <!--Contents of the To-Do list-->
                <div>
                    <input type="checkbox" id="task2" name="task2">
                    <label for="task2">Notify Employee</label>
                </div>
                <div>
                    <input type="checkbox" id="task1" name="task1">
                    <label for="task1">Schedule Interview</label>
                </div>
                <div>
                    <input type="checkbox" id="task2" name="task2">
                    <label for="task2">Gather Paperwork</label>
                </div>
                <div>
                    <input type="checkbox" id="task2" name="task2">
                    <label for="task2">Prepare Exit Interview Questions</label>
                </div>
                <div>
                    <input type="checkbox" id="task2" name="task2">
                    <label for="task2">Update Employee Records</label>
                </div>
                <div>
                    <input type="checkbox" id="task2" name="task2">
                    <label for="task2">Terminate Employee After Interview Has Been Conducted</label>
                </div>
            </form>
        </div>
        <!--link to view employee meeting with manager requests-->
        <a href="https://docs.google.com/spreadsheets/d/1ZtieBCOE0YeNHysheZx5ZVx9j77_zCPw1iwP-6NzbBs/edit?resourcekey=&gid=247333391#gid=247333391" id="viewEmployeeManagerMeetingRequests">View Employee Meeting with Manager Requests</a>
    </body>
</html>
