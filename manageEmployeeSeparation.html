<!DOCTYPE html>
<html>
    <head>
        <title>XYZ Company HR Website</title>
        <link rel="stylesheet" href="csstest.css">
    </head>

    <body>
        <!--Home button to go back to the dashboard-->
        <a href="managerDashboard.html" id="dashboard">⬅ Dashboard</a>

        <!--Header for the page-->
        <div id="manageEmployeeSeparationHeader">
            <p>Manage Employee Separation</p>
        </div>

        <!--Search through employees through this form to select an employee to let go-->
        <div id="viewEmployeeForm" style="max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
            <div style="display: flex; gap: 10px; margin-bottom: 16px;">
                <input type="text" id="empId" placeholder="Employee ID" style="flex:1; padding: 8px;">
                <button onclick="loadEmployee()">Load Employees</button>
            </div>

            <!--Select which employee to terminate-->
            <div id="employeeStatusFormBody">
                <label>Employee ID</label>
                <input type="number" id="EmployeeID" style="width:100%; margin-bottom:10px;"><br>
                <label>
                    <input type="checkbox" id="terminated" name="is_terminated" value="true">
                    Is this employee terminated?
                </label>
                
                <!--Button to save changes-->
                <button onclick="submitUpdate()">Save Changes</button>
                <label>Warning: By clicking 'Save Changes' you are permanently removing this employee from the system.</label>
            </div>
        </div>
        <script>
            // gets employee data from database
            const API_URL = 'https://human-resources-turnover-system-csci-440-01w-production.up.railway.app';
 
            async function loadEmployee() {
                const id = document.getElementById('empId').value.trim();
                if (!id) { alert('Please enter an Employee ID'); return; }
 
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.style.color = '#333';
                statusMsg.textContent = 'Loading...';
                document.getElementById('formBody').style.display = 'none';
 
                try {
                    const response = await fetch(`${API_URL}/users`);
                    const users = await response.json();
                    const employee = users.find(u => String(u.password) === String(id));
 
                    if (!employee) {
                        statusMsg.style.color = '#c0392b';
                        statusMsg.textContent = 'No employee found with that ID.';
                        return;
                    }
 
                    document.getElementById('FirstName').value  = employee.username || '';
                    document.getElementById('LastName').value   = employee.LastName  || '';
                    document.getElementById('DOB').value        = employee.DOB       || '';
                    document.getElementById('Address').value    = employee.Address   || '';
                    document.getElementById('PhoneNum').value   = employee.PhoneNum  || '';
                    document.getElementById('Email').value      = employee.Email     || '';
                    document.getElementById('HireDate').value   = employee.HireDate  || '';
                    document.getElementById('Salary').value     = employee.Salary    || '';
                    document.getElementById('DeptID').value     = employee.DeptID    || '';
                    document.getElementById('PositionID').value = employee.PositionID || '';
 
                    document.getElementById('formBody').style.display = 'block';
                    statusMsg.textContent = '';
 
                } catch (err) {
                    console.error(err);
                    statusMsg.style.color = '#c0392b';
                    statusMsg.textContent = 'Error connecting to server.';
                }
            }
 
            async function submitUpdate() {
                const id = document.getElementById('empId').value.trim();
                if (!id) { alert('Please enter an Employee ID'); return; }
 
                const payload = {
                    EmployeeID: id,
                    FirstName:  document.getElementById('FirstName').value,
                    LastName:   document.getElementById('LastName').value,
                    DOB:        document.getElementById('DOB').value,
                    Address:    document.getElementById('Address').value,
                    PhoneNum:   document.getElementById('PhoneNum').value,
                    Email:      document.getElementById('Email').value,
                    HireDate:   document.getElementById('HireDate').value,
                    Salary:     document.getElementById('Salary').value,
                    DeptID:     document.getElementById('DeptID').value,
                    PositionID: document.getElementById('PositionID').value,
                };
 
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.style.color = '#333';
                statusMsg.textContent = 'Saving...';
 
                try {
                    const res = await fetch(`${API_URL}/update-employee`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
 
                    if (res.ok) {
                        statusMsg.style.color = 'green';
                        statusMsg.textContent = data.message || 'Employee updated successfully!';
                    } else {
                        statusMsg.style.color = '#c0392b';
                        statusMsg.textContent = data.message || 'Failed to update employee.';
                    }
                } catch (err) {
                    console.error(err);
                    statusMsg.style.color = '#c0392b';
                    statusMsg.textContent = 'Error: could not reach server.';
                }
            }
        </script>
    </body>
</html>
