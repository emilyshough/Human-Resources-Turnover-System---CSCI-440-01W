<!DOCTYPE html>
<html>
    <head>
        <title>XYZ Company HR Website</title>
        <link rel="stylesheet" href="csstest.css">
    </head>

    <body>
        <!--Home button to go back to the dashboard-->
        <a href="managerDashboard.html" id="dashboard">⬅ Dashboard</a>
 
        <!--Header for the page-->
        <div id="manageEmployeeSeparationHeader">
            <p>Manage Employee Separation</p>
        </div>
 
        <div id="viewEmployeeForm" style="max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
 
            <!-- Enter ID and load employee -->
            <div style="display: flex; gap: 10px; margin-bottom: 16px;">
                <input type="text" id="empId" placeholder="Employee ID" style="flex:1; padding: 8px;">
                <button onclick="loadEmployee()">Load Employee</button>
            </div>
 
            <!-- Status/error messages -->
            <p id="statusMsg" style="font-weight: bold; color: #333;"></p>
 
            <!-- Employee info card — hidden until loaded -->
            <div id="employeeInfo" style="display:none; margin-bottom: 16px; padding: 10px; background: #f2e6d5; border-radius: 4px;">
                <strong>Name:</strong> <span id="empName">—</span><br>
                <strong>Employee ID:</strong> <span id="empIdDisplay">—</span>
            </div>
 
            <!-- Termination form — hidden until loaded -->
            <div id="employeeStatusFormBody" style="display:none;">
                <label>
                    <input type="checkbox" id="terminated" name="is_terminated" value="true">
                    Is this employee terminated?
                </label>
                <br><br>
                <button onclick="submitUpdate()">Save Changes and Send Separation Notification</button>
                <p style="color: #c0392b; font-size: 0.85em;">
                    Warning: By clicking 'Save Changes' you are permanently removing this employee from the system.
                </p>
            </div>
 
        </div>
        <script>
            // gets employee data from database
            const API_URL = 'https://human-resources-turnover-system-csci-440-01w-production.up.railway.app';
 
            async function loadEmployee() {
                const id = document.getElementById('empId').value.trim();
                if (!id) { alert('Please enter an Employee ID'); return; }
 
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.style.color = '#333';
                statusMsg.textContent = 'Loading...';
                document.getElementById('employeeInfo').style.display = 'none';
                document.getElementById('employeeStatusFormBody').style.display = 'none';
 
                try {
                    const response = await fetch(`${API_URL}/users`);
                    const users = await response.json();
                    const employee = users.find(u => String(u.password) === String(id));
 
                    if (!employee) {
                        statusMsg.style.color = '#c0392b';
                        statusMsg.textContent = 'No employee found with that ID.';
                        return;
                    }
 
                    document.getElementById('empName').textContent = employee.username;
                    document.getElementById('empIdDisplay').textContent = id;
                    document.getElementById('employeeInfo').style.display = 'block';
                    document.getElementById('employeeStatusFormBody').style.display = 'block';
                    document.getElementById('terminated').checked = false;
                    statusMsg.textContent = '';
 
                } catch (err) {
                    console.error(err);
                    statusMsg.style.color = '#c0392b';
                    statusMsg.textContent = 'Error connecting to server.';
                }
            }
 
            async function submitUpdate() {
                const id = document.getElementById('empId').value.trim();
                const isTerminated = document.getElementById('terminated').checked;
 
                if (!isTerminated) {
                    alert('Please check the termination box to confirm.');
                    return;
                }
 
                const name = document.getElementById('empName').textContent;
                if (!confirm(`Are you sure you want to permanently remove ${name} (ID: ${id})? This cannot be undone.`)) return;
 
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.style.color = '#333';
                statusMsg.textContent = 'Processing...';
 
                try {
                    const response = await fetch(`${API_URL}/employees/${id}`, {
                        method: 'DELETE',
                    });
 
                    if (response.ok) {
                        statusMsg.style.color = 'green';
                        statusMsg.textContent = `Employee ${name} (ID: ${id}) has been successfully removed.`;
                        document.getElementById('employeeStatusFormBody').style.display = 'none';
                        document.getElementById('employeeInfo').style.display = 'none';
                        document.getElementById('empId').value = '';
                    } else {
                        statusMsg.style.color = '#c0392b';
                        statusMsg.textContent = 'Failed to remove employee.';
                    }
                } catch (err) {
                    console.error(err);
                    statusMsg.style.color = '#c0392b';
                    statusMsg.textContent = 'Error connecting to server.';
                }
            }

        </script>
    </body>
</html>
